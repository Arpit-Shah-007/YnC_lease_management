const BRAND_COLOR = { wendys: '#e2211c', tacobell: '#702082' };
const BRAND_LABEL = { wendys: "Wendy's", tacobell: 'Taco Bell' };

const map = L.map('map', { center: [40.4, -74.8], zoom: 8 });

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 19
}).addTo(map);

const bounds = [];

LOCATIONS.forEach(function(loc) {
  const color = BRAND_COLOR[loc.brand] || '#555';
  const size  = loc.active ? 16 : 12;
  const icon  = L.divIcon({
    className: '',
    html: '<div style="width:' + size + 'px;height:' + size + 'px;border-radius:50%;background:' + color + ';border:2px solid ' + (loc.active ? '#fff' : 'rgba(255,255,255,.55)') + ';box-shadow:0 1px 5px rgba(0,0,0,.4);opacity:' + (loc.active ? 1 : 0.65) + '"></div>',
    iconSize:   [size, size],
    iconAnchor: [size / 2, size / 2]
  });

  const popup = '<div style="font-family:system-ui,sans-serif;font-size:13px;min-width:155px;line-height:1.5">'
    + '<div style="font-weight:700;color:' + color + ';margin-bottom:2px">' + (BRAND_LABEL[loc.brand] || loc.brand) + '</div>'
    + '<div style="font-weight:600;color:#1a1523">' + loc.name + '</div>'
    + '<div style="color:#574f65;font-size:12px">' + loc.address + '</div>'
    + '<div style="color:#574f65;font-size:12px">' + loc.city + ', ' + loc.state + '</div>'
    + (loc.active ? '<div style="margin-top:4px;color:#1f7a4d;font-size:11px;font-weight:600">Active Lease</div>' : '')
    + '</div>';

  L.marker([loc.lat, loc.lng], { icon: icon })
    .bindPopup(popup, { maxWidth: 240 })
    .addTo(map);

  bounds.push([loc.lat, loc.lng]);
});

if (bounds.length > 1) {
  map.fitBounds(bounds, { padding: [32, 32] });
